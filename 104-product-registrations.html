<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Product Registration</title>
</head>
<body>
    
    <section class="m-5">
        <h1>Product Registration</h1>

        <form class="bg-light border p-3 mt-5">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" type="text" name="ProductName" id="" placeholder="eggs">
            </div>
            <div class="mb-3">
                <label class="form-label">Price</label>
                <input class="form-control" type="number" name="ProductPrice" id="" placeholder="10.55">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Category</label>
                    <select class="form-control" name="ProductCategory" id="">
                        <option value="">Select a category</option>
                        <option value="Fruits">Fruits</option>
                        <option value="Vegetables">Vegetables</option>
                    </select>
            </div>
            
            <div class="d-flex justify-content-end">
                <button class="btn btn-primary m-1" type="Rest">Reset</button>
                <button onclick="registerProduct(event)" class="btn btn-primary m-1" type="submit">Register</button>
            </div>
        </form>
    
    
    </section>

    <section classs="m-4">
        <h2>Registered Product</h2>

        <table class="table table-bordered">
            <!-- Header -->
                <tr> 
                    <th>Name</th>
                    <th>Price</th>
                    <th>Category</th>
                    <th>Delete</th>
                </tr>
            

            <!--Body -->
            <tbody id="body">
            </tbody>

        </table>



    </section>

    <script src="./scripts/104-product-registration.js"></script>
    
</body>
</html>
