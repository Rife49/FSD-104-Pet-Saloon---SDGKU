<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Bear's Salon</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="registration.html">Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="services.html">Services</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <h1>Registration</h1>
    <body onload="displayPets()">

    <div class="container">
        <ol id="pets"></ol>
    </div>
        <section class="m-5">
            <h2>Product Registration</h1>

        <form class="bg-light border p-3 mt-5">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" type="text" name="name" id="" placeholder="Bear">
            </div>
            <div class="mb-3">
                <label class="form-label">Age</label>
                <input class="form-control" type="number" name="age" id="" placeholder="Age">
            </div>

            <div class="mb-3">
                <label class="form-label">Breed</label>
                <input class="form-control" type="text" name="breed" id="" placeholder="Breed">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Gender</label>
                    <select class="form-control" name="gender" id="">
                        <option value="">Select a category</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Services</label>
                    <select class="form-control" name="services" id="">
                        <option value="">Select a category</option>
                        <option value="Wash & Groom">Wash & Groom</option>
                        <option value="Gold Package">Gold Package</option>
                    </select>
            </div>
            
            <div class="d-flex justify-content-end">
                <button class="btn btn-primary m-1" type="Rest">Reset</button>
                <button onclick="registerProduct(event)" class="btn btn-primary m-1" type="submit">Register</button>
            </div>
        </form>
    
    
    </section>

    <section classs="m-4">
        <h2>Registered Product</h2>

        <table class="table table-bordered">
            <!-- Header -->
                <tr> 
                    <th>Name</th>
                    <th>Age</th>
                    <th>Breed</th>
                    <th>Gender</th>
                    <th>Services</th>
                </tr>
            

            <!--Body -->
            <tbody id="body">
            </tbody>

        </table>
    
    </section>

    <script src="./scripts/registration.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>  
</body>
</html>
